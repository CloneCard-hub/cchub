<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live Chat</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

/* Background */
.bg{
    position:fixed;
    width:100%;
    height:100%;
    object-fit:cover;
    z-index:-2;
}

.overlay{
    position:fixed;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.75);
    z-index:-1;
}

/* Chat Box */
.chat-container{
    width:100%;
    max-width:420px;
    height:680px;
    background:rgba(0,0,0,0.55);
    backdrop-filter:blur(20px);
    border-radius:20px;
    display:flex;
    flex-direction:column;
    box-shadow:0 20px 60px rgba(255,0,0,0.3);
    border:1px solid rgba(255,0,0,0.2);
    overflow:hidden;
}

/* Header */
.chat-header{
    padding:18px;
    text-align:center;
    background:linear-gradient(135deg,#ff0000,#990000);
    font-weight:600;
    letter-spacing:1px;
    position:relative;
}

.btn{
    position:absolute;
    top:10px;
    padding:6px 10px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-size:11px;
    background:rgba(0,0,0,0.6);
    color:white;
    transition:0.3s;
}

.btn:hover{
    background:#222;
}

.home{ left:10px; }
.clear{ right:10px; }

/* Notice */
.notice{
    text-align:center;
    padding:8px;
    font-size:12px;
    background:rgba(255,0,0,0.1);
    color:#ffb3b3;
}

/* Messages */
.chat-messages{
    flex:1;
    padding:15px;
    overflow-y:auto;
}

/* Bubble */
.message{
    margin-bottom:12px;
    padding:10px 14px;
    border-radius:18px;
    max-width:80%;
    animation:fadeIn 0.3s ease;
}

/* User */
.user{
    background:linear-gradient(135deg,#ff0000,#cc0000);
    margin-left:auto;
}

/* Bot */
.bot{
    background:rgba(255,255,255,0.08);
    color:#eee;
}

/* Input */
.chat-input{
    display:flex;
    padding:10px;
    border-top:1px solid rgba(255,0,0,0.2);
}

.chat-input input{
    flex:1;
    padding:12px;
    border:none;
    outline:none;
    border-radius:10px;
    background:rgba(255,255,255,0.08);
    color:#fff;
}

.chat-input button{
    margin-left:8px;
    padding:12px 15px;
    border:none;
    border-radius:10px;
    background:linear-gradient(135deg,#ff0000,#cc0000);
    color:white;
    cursor:pointer;
}

/* Animation */
@keyframes fadeIn{
    from{opacity:0; transform:translateY(5px);}
    to{opacity:1; transform:translateY(0);}
}

/* Mobile */
@media(max-width:480px){
    .chat-container{
        height:92vh;
        margin:10px;
    }
    .message{
        max-width:90%;
    }
}
</style>
</head>

<body>

<img src="hero.png" class="bg">
<div class="overlay"></div>

<div class="chat-container">

    <div class="chat-header">
        <button class="btn home" onclick="location.href='index.html'">Home</button>
        Live Chat
        <button class="btn clear" onclick="clearChat()">Clear</button>
    </div>

    <div class="notice">We reply within 1–24 hours</div>

    <div class="chat-messages" id="chat"></div>

    <div class="chat-input">
        <input type="text" id="input" placeholder="Type a message...">
        <button onclick="send()">Send</button>
    </div>

</div>

<script>
const chat = document.getElementById("chat");
const input = document.getElementById("input");

// Load saved data
let data = JSON.parse(localStorage.getItem("chatData")) || [];
let replied = localStorage.getItem("replied") === "true";

// Render old messages
data.forEach(m => addMessage(m.text, m.type));

// Add message
function addMessage(text,type){
    const msg = document.createElement("div");
    msg.className = "message " + type;
    msg.textContent = text;
    chat.appendChild(msg);
    chat.scrollTop = chat.scrollHeight;
}

// Save
function save(text,type){
    data.push({text,type});
    localStorage.setItem("chatData", JSON.stringify(data));
}

// Send
function send(){
    const text = input.value.trim();
    if(!text) return;

    addMessage(text,"user");
    save(text,"user");
    input.value="";

    // AI reply ONLY ONCE EVER
    if(!replied){
        setTimeout(()=>{
            const reply = "Thanks for reaching out. Our team will contact you soon.";
            addMessage(reply,"bot");
            save(reply,"bot");
            localStorage.setItem("replied","true");
        },1000);

        replied = true;
    }
}

// Clear (logout style)
function clearChat(){
    localStorage.clear();
    chat.innerHTML="";
    replied = false;
}

// Enter key
input.addEventListener("keypress",e=>{
    if(e.key==="Enter") send();
});
</script>

</body>
</html>
